<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zahir | Portfolio</title>
  <style>
    :root {
      --bg: #0d1117;
      --text: #58a6ff;
      --accent: #00ff88;
      --card-bg: #161b22;
      --card-border: #30363d;
    }
    body.claro {
      --bg: #ffffff;
      --text: #24292f;
      --accent: #0969da;
      --card-bg: #f6f8fa;
      --card-border: #d0d7de;
    }
    body {
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:monospace;
      overflow-x:hidden;
      transition: all 0.3s;
    }
    #matrix {
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      z-index:-1;
    }
    body.claro #matrix { display: none; }
.content {
      position:relative;
      z-index:1;
      text-align:center;
      padding:50px 20px;
    }
    h1 { color:var(--accent); margin:0 auto; }
.card {
      background:var(--card-bg);
      border:1px solid var(--card-border);
      border-radius:8px;
      padding:20px;
      margin:20px auto;
      max-width:400px;
      text-align:left;
    }
    #botonTema {
      position:absolute;
      top:20px;
      right:20px;
      background:var(--card-bg);
      color:var(--accent);
      border:1px solid var(--accent);
      border-radius:20px;
      padding:8px 15px;
      font-weight:bold;
      cursor:pointer;
      z-index:10;
    }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>
  <div class="content">
    <button id="botonTema">🌙 Oscuro</button>
    <img src="https://ui-avatars.com/api/?name=Zahir&background=00ff88&color=0d1117&size=120" style="width:120px;height:120px;border-radius:50%;border:3px solid var(--accent);margin-bottom:20px;">
    <h1>Hola mundo, soy Zahir</h1>
    <p>Frontend Dev desde San Pedro, Buenos Aires 🌊</p>
    <a href="https://wa.me/543445302244" style="background:#25D366; color:white; padding:15px 30px; border-radius:25px; text-decoration:none; font-weight:bold; margin-top:20px; display:inline-block;">📱 Mandame WhatsApp</a>
    <div style="margin-top:80px;">
      <h2 style="color:var(--accent); border-bottom:2px solid var(--accent); display:inline-block;">Mis Proyectos</h2>
      <div class="card">
        <h3 style="color:var(--text);">🚀 Mi Portfolio Web</h3>
        <p style="color:#8b949e;">Mi primera web hecha 100% desde el celu. HTML + CSS + JavaScript + efecto Matrix.</p>
      </div>
    </div>
  </div>
  <script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const letras = '01ZAHIR';
    const fontSize = 14;
    const columnas = canvas.width / fontSize;
    const drops = [];
    for(let x = 0; x < columnas; x++) drops[x] = 1;
    function dibujar() {
      ctx.fillStyle = 'rgba(13, 17, 23, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#00ff88';
      ctx.font = fontSize + 'px monospace';
      for(let i = 0; i < drops.length; i++) {
        const texto = letras[Math.floor(Math.random() * letras.length)];
        ctx.fillText(texto, i * fontSize, drops[i] * fontSize);
        if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }
    setInterval(dibujar, 35);

    document.getElementById('botonTema').onclick = function() {
      document.body.classList.toggle('claro');
      this.innerHTML = document.body.classList.contains('claro')? '☀️ Claro' : '🌙 Oscuro';
    };
  </script>
</body>
</html>
